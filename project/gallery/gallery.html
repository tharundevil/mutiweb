<!DOCTYPE html>
<html>
<head>
<title>Image Gallery</title>
<style>
body {
  margin:0;
  font-family:sans-serif;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  padding:10px;
}

.gallery div {
  position:relative;
  overflow:hidden;
}

.gallery img {
  width:100%;
  transition:0.5s;
}

.gallery div:hover img {
  transform:scale(1.2);
}

.overlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:0.5s;
}

.gallery div:hover .overlay {
  opacity:1;
}
</style>
</head>
<body>

<div class="gallery">
  <div>
    <img src="https://picsum.photos/300">
    <div class="overlay">Image 1</div>
  </div>
  <div>
    <img src="https://picsum.photos/301">
    <div class="overlay">Image 2</div>
  </div>
  <div>
    <img src="https://picsum.photos/302">
    <div class="overlay">Image 3</div>
  </div>
</div>

</body>
</html>
