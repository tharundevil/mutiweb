<!DOCTYPE html>
<html>
<head>
<title>Portfolio Card</title>
<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#667eea,#764ba2);
  font-family:Arial;
}

.card {
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:15px;
  text-align:center;
  color:white;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

img {
  width:100px;
  border-radius:50%;
}

.icons a {
  margin:10px;
  color:white;
  text-decoration:none;
  font-size:20px;
}
</style>
</head>
<body>

<div class="card">
  <img src="https://i.pravatar.cc/100">
  <h2>Pravin Kumar</h2>
  <p>Web Developer</p>
  <div class="icons">
    <a href="#">🌐</a>
    <a href="#">💼</a>
    <a href="#">📧</a>
  </div>
</div>

</body>
</html>
